<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SABA TELECOM ADMIN</title>

<style>

*{
box-sizing:border-box;
font-family:Arial;
margin:0;
padding:0;
}

body{
background:#0f2027;
color:white;
padding:20px;
text-align:center;
}

h1{
margin-bottom:20px;
}

.panel{
background:#203a43;
padding:20px;
border-radius:10px;
max-width:400px;
width:100%;
margin:auto;
}

input{
width:100%;
padding:12px;
margin:8px 0;
border:none;
border-radius:6px;
font-size:14px;
}

button{
background:#25D366;
border:none;
padding:12px;
width:100%;
color:white;
border-radius:6px;
cursor:pointer;
margin-top:10px;
font-size:16px;
}

button:hover{
background:#1ebe5d;
}

h2{
margin-top:30px;
margin-bottom:15px;
}

/* MOBILE LIST */

.list{
display:flex;
flex-direction:column;
gap:15px;
max-width:500px;
margin:auto;
}

.mobile{
background:#162a32;
padding:15px;
border-radius:10px;
text-align:left;
}

.mobile img{
width:100%;
border-radius:8px;
margin-bottom:10px;
}

.mobile h3{
margin-bottom:5px;
}

.mobile p{
margin:3px 0;
}

.delete{
background:#ff4d4d;
margin-top:10px;
}

.delete:hover{
background:#e60000;
}

/* DESKTOP GRID */

@media (min-width:700px){

.list{
flex-direction:row;
flex-wrap:wrap;
justify-content:center;
}

.mobile{
width:220px;
}

}

</style>

</head>

<body>

<h1>SABA TELECOM ADMIN</h1>

<div class="panel">

<input id="name" placeholder="Mobile Name">

<input id="ram" placeholder="RAM / Storage">

<input id="price" placeholder="Price">

<input id="brand" placeholder="Brand">

<input type="file" id="image">

<input id="video" placeholder="Mobile Video URL">

<button onclick="addMobile()">Add Mobile</button>

</div>

<h2>Saved Mobiles</h2>

<div class="list" id="list"></div>

<script>

let mobiles = JSON.parse(localStorage.getItem("mobiles")) || []

function save(){
localStorage.setItem("mobiles",JSON.stringify(mobiles))
showMobiles()
}

function addMobile(){

let name=document.getElementById("name").value
let ram=document.getElementById("ram").value
let price=document.getElementById("price").value
let brand=document.getElementById("brand").value
let video=document.getElementById("video").value

let file=document.getElementById("image").files[0]

if(!file){
alert("Please upload image")
return
}

let reader=new FileReader()

reader.onload=function(){

let image=reader.result

mobiles.push({name,ram,price,image,brand,video})

save()

}

reader.readAsDataURL(file)

}

function deleteMobile(i){

mobiles.splice(i,1)

save()

}

function showMobiles(){

let html=""

mobiles.forEach((m,i)=>{

html+=`

<div class="mobile">

<img src="${m.image}">

<h3>${m.name}</h3>

<p>${m.ram}</p>

<p>₹${m.price}</p>

<p>${m.brand}</p>

${m.video ? `<a href="${m.video}" target="_blank">Watch Video</a>` : ""}

<button class="delete" onclick="deleteMobile(${i})">Delete</button>

</div>

`

})

document.getElementById("list").innerHTML=html

}

showMobiles()

</script>

</body>
</html>
